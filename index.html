<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💬 EchoChat | Modern Real-time Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #131b2c 0%, #0f1722 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* Main chat container */
        .chat-app {
            max-width: 1300px;
            width: 100%;
            height: 90vh;
            background: rgba(18, 25, 40, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Header area */
        .chat-header {
            background: rgba(12, 18, 28, 0.9);
            backdrop-filter: blur(8px);
            padding: 1rem 1.8rem;
            border-bottom: 1px solid rgba(78, 110, 160, 0.25);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .brand-icon {
            background: #3b82f6;
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 6px 12px -6px #1e3a8a;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0f2fe, #a5c9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .user-status {
            background: #0f172f;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #b9d0ff;
            border: 1px solid #2d3a5e;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 6px #22c55e;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.1);}
        }

        /* messages area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            scroll-behavior: smooth;
        }

        /* custom scroll */
        .messages-container::-webkit-scrollbar {
            width: 5px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0e1622;
            border-radius: 10px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #3b4e74;
            border-radius: 10px;
        }

        /* message bubble */
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeSlideUp 0.2s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .message-own {
            align-self: flex-end;
            justify-content: flex-end;
        }
        .message-other {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.7rem 1.1rem;
            border-radius: 1.8rem;
            word-wrap: break-word;
            max-width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.1s;
        }

        .message-own .bubble {
            background: linear-gradient(125deg, #2563eb, #1e40af);
            color: white;
            border-bottom-right-radius: 0.4rem;
        }
        .message-other .bubble {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(4px);
            color: #eef3ff;
            border-bottom-left-radius: 0.4rem;
            border: 1px solid #334155;
        }

        .message-info {
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.2rem;
            margin-bottom: 0.2rem;
            padding: 0 0.4rem;
            color: #8ca3cf;
        }
        .message-own .message-info {
            justify-content: flex-end;
        }
        .message-other .message-info {
            justify-content: flex-start;
        }
        .sender-name {
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #1e293b;
            width: fit-content;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            margin-top: 0.2rem;
            font-size: 0.75rem;
            color: #9ab3e0;
        }
        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7aa2f7;
            margin: 0 2px;
            animation: blink 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
            30% { opacity: 1; transform: translateY(-2px);}
        }

        /* input area */
        .input-area {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 1.8rem;
            border-top: 1px solid rgba(71, 95, 135, 0.4);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            background: #0f172a;
            border-radius: 60px;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border: 1px solid #2d3b57;
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        #messageInput {
            background: transparent;
            border: none;
            padding: 0.8rem 0;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            color: #eef2ff;
        }
        #messageInput::placeholder {
            color: #5b6e9e;
        }

        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 60px;
            padding: 0.6rem 1.3rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        button:hover {
            background: #2563eb;
            transform: scale(0.97);
        }
        button:active {
            background: #1e40af;
        }

        .emoji-btn {
            background: #1e2a47;
            padding: 0.6rem 1rem;
            font-size: 1.2rem;
        }
        .emoji-btn:hover {
            background: #334155;
        }

        /* username modal overlay */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.2s;
        }
        .modal-card {
            background: #0f172f;
            max-width: 380px;
            width: 90%;
            padding: 2rem 1.8rem;
            border-radius: 2rem;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            border: 1px solid #2b3a60;
            text-align: center;
        }
        .modal-card h2 {
            color: #d9e6ff;
            margin-bottom: 0.5rem;
        }
        .modal-card p {
            color: #94a3d8;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        #usernameInput {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 60px;
            background: #1e293b;
            border: 1px solid #3b4e74;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1.3rem;
        }
        #usernameInput:focus {
            border-color: #3b82f6;
        }
        .modal-btn {
            background: #3b82f6;
            width: 100%;
            justify-content: center;
            padding: 0.8rem;
            font-size: 1rem;
        }

        /* empty messages placeholder */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #5e719b;
            gap: 0.5rem;
            text-align: center;
        }
        .hide {
            display: none;
        }

        @media (max-width: 600px) {
            .chat-app {
                height: 95vh;
                border-radius: 1.2rem;
            }
            .message {
                max-width: 90%;
            }
            .brand h1 {
                font-size: 1.2rem;
            }
            .input-area {
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="chat-app" id="chatApp">
    <div class="chat-header">
        <div class="brand">
            <div class="brand-icon">💬</div>
            <h1>EchoChat · Live</h1>
        </div>
        <div class="user-status">
            <span class="online-dot"></span>
            <span id="currentUsernameDisplay">Guest</span>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <!-- dynamic messages will appear here -->
        <div class="empty-chat" id="emptyChatPlaceholder">
            <span>✨</span>
            <span>No messages yet</span>
            <small>Be the first to say hello!</small>
        </div>
    </div>

    <!-- typing indicator area -->
    <div style="padding: 0 1.8rem 0.2rem 1.8rem;" id="typingAreaWrapper">
        <div id="globalTypingIndicator" class="typing-indicator" style="display: none;">
            <span>✍️</span> <span id="typingUserName">Someone</span> is typing
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Type your message... 📝" autocomplete="off">
        </div>
        <button id="emojiButton" class="emoji-btn" title="Add emoji">😊</button>
        <button id="sendButton">➤ Send</button>
    </div>
</div>

<script>
    // ---------- CHAT STATE ----------
    let currentUser = { name: "", id: null };
    let messages = [];          // store messages { id, senderName, text, timestamp, isOwn }
    let typingUsers = new Set(); // store user names currently typing
    let typingTimeout = null;

    // DOM elements
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyPlaceholder = document.getElementById('emptyChatPlaceholder');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendButton');
    const emojiBtn = document.getElementById('emojiButton');
    const currentUsernameSpan = document.getElementById('currentUsernameDisplay');
    const globalTypingDiv = document.getElementById('globalTypingIndicator');
    const typingUserNameSpan = document.getElementById('typingUserName');

    // Helper: generate random ID
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 8);
    }

    // render all messages to DOM
    function renderMessages() {
        if (!messagesContainer) return;

        // Show/hide empty placeholder
        if (messages.length === 0) {
            emptyPlaceholder.classList.remove('hide');
        } else {
            emptyPlaceholder.classList.add('hide');
        }

        // preserve scroll position relative? We'll auto-scroll after append but we'll re-render full? 
        // Efficient: but we'll rebuild sorted by timestamp
        const sorted = [...messages].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        messagesContainer.innerHTML = '';
        sorted.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.isOwn ? 'message-own' : 'message-other'}`;
            msgDiv.setAttribute('data-id', msg.id);
            
            // bubble + info
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.innerText = msg.text;
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message-info';
            if (!msg.isOwn) {
                infoDiv.innerHTML = `<span class="sender-name">${escapeHtml(msg.senderName)}</span> <span>•</span> <span>${formatTime(msg.timestamp)}</span>`;
            } else {
                infoDiv.innerHTML = `<span>${formatTime(msg.timestamp)}</span> <span>•</span> <span>You</span>`;
            }
            
            msgDiv.appendChild(bubbleDiv);
            msgDiv.appendChild(infoDiv);
            messagesContainer.appendChild(msgDiv);
        });
        
        // auto scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // simple time formatter
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
    }

    // escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // add new message (internal)
    function addMessage(senderName, text, isOwn = false, customId = null) {
        if (!text || text.trim() === '') return false;
        const newMsg = {
            id: customId || generateId(),
            senderName: senderName,
            text: text.trim(),
            timestamp: new Date().toISOString(),
            isOwn: isOwn
        };
        messages.push(newMsg);
        renderMessages();
        return true;
    }

    // send message action
    function sendMessage() {
        let rawText = messageInput.value;
        if (!rawText || rawText.trim() === '') return;
        const finalText = rawText.trim();
        
        // add own message
        addMessage(currentUser.name, finalText, true);
        messageInput.value = '';
        
        // Simulate "other user" response (echo bot) to make app alive and interactive
        // But avoid if the message is too long or just command-like, but fun echo.
        // Simulate random typing indicator from "Stranger" then reply after delay
        if (finalText.length > 0) {
            simulateOtherUserReply(finalText);
        }
        
        // Also stop any ongoing typing indicator from current user (we clear & hide)
        clearOwnTypingIndicator();
    }
    
    // Simulate another random chatter (to demo live interactions)
    // Using a set of cool names
    const botNames = ["Luna", "Alex", "Morgan", "Sam", "Taylor", "Casey", "Jordan", "Riley"];
    let lastBotIndex = 0;
    
    function simulateOtherUserReply(originalMsg) {
        // sometimes respond with fun replies, but not always instantly.
        // give a typing effect from a random "online user"
        const randomBot = botNames[Math.floor(Math.random() * botNames.length)];
        // avoid replying too fast if user spams? but fine.
        // show typing indicator from this bot
        showTypingFromUser(randomBot);
        
        // generate contextual reply
        let replyText = "";
        const lowerMsg = originalMsg.toLowerCase();
        if (lowerMsg.includes("hi") || lowerMsg.includes("hello")) {
            replyText = `Hey ${currentUser.name}! 👋 Great to chat!`;
        } else if (lowerMsg.includes("how are you")) {
            replyText = "I'm just a friendly echo bot, but feeling awesome! 😎 And you?";
        } else if (lowerMsg.includes("weather")) {
            replyText = "Sunny in the cloud ☁️ but always bright here!";
        } else if (lowerMsg.includes("thanks")) {
            replyText = "You're welcome! ✨ Anytime!";
        } else if (lowerMsg.includes("?")) {
            replyText = "That's an interesting question! Tell me more.";
        } else if (lowerMsg.length > 15) {
            replyText = `"${originalMsg.substring(0,40)}..." — Love it! 🙌`;
        } else {
            const reactions = ["Nice one! 🚀", "Cool! 😊", "I see you!", "Echo: " + originalMsg, "👏 Well said!", "✨ Awesome vibes"];
            replyText = reactions[Math.floor(Math.random() * reactions.length)];
        }
        
        setTimeout(() => {
            // remove typing indicator after reply
            removeTypingFromUser(randomBot);
            addMessage(randomBot, replyText, false);
        }, 1500 + Math.random() * 1000);
    }
    
    // Typing indicator management (multi-user simulation)
    function showTypingFromUser(userName) {
        if (userName === currentUser.name) return; // don't show own typing in global indicator
        typingUsers.add(userName);
        updateTypingUI();
        // auto remove after 3 seconds if no stop signal (timeout)
        setTimeout(() => {
            if (typingUsers.has(userName)) {
                typingUsers.delete(userName);
                updateTypingUI();
            }
        }, 4000);
    }
    
    function removeTypingFromUser(userName) {
        if (typingUsers.has(userName)) {
            typingUsers.delete(userName);
            updateTypingUI();
        }
    }
    
    function updateTypingUI() {
        if (typingUsers.size === 0) {
            globalTypingDiv.style.display = 'none';
            return;
        }
        const typingList = Array.from(typingUsers);
        let displayText = '';
        if (typingList.length === 1) {
            displayText = typingList[0];
        } else if (typingList.length === 2) {
            displayText = typingList[0] + ' and ' + typingList[1];
        } else {
            displayText = typingList[0] + ' and others';
        }
        typingUserNameSpan.innerText = displayText;
        globalTypingDiv.style.display = 'flex';
    }
    
    // clear current user typing broadcast (we simulate that when typing we send signal to others)
    let typingDebounce = null;
    function onUserTyping() {
        if (typingDebounce) clearTimeout(typingDebounce);
        // Simulate broadcasting typing to other users - in this UI, we treat that "other users" could see current user typing
        // but because it's a single client simulation, we will just indicate in a fake way? But to enhance realism: we'll simulate "current user is typing" effect for the stranger? Actually we don't need but we add "You are typing" indicator? Not needed.
        // However, to make it interesting, we'll emit an artificial event that other participants (the bot) may respond quicker? not needed.
        // But for demo, we set typing indicator for current user? Not necessary. I'll skip but keep functionality.
        // For professionalism, let's clear.
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            // user stopped typing
        }, 1000);
    }
    
    function clearOwnTypingIndicator() {
        // nothing else
    }
    
    // attach typing listener
    messageInput.addEventListener('input', () => {
        onUserTyping();
    });
    
    // Emoji picker simple
    function insertEmoji() {
        const emojis = ['😊', '😂', '🔥', '❤️', '👍', '🎉', '✨', '💬', '👋', '😎', '🤝', '💡', '🚀', '⭐'];
        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        const start = messageInput.selectionStart;
        const end = messageInput.selectionEnd;
        const text = messageInput.value;
        messageInput.value = text.substring(0, start) + randomEmoji + text.substring(end);
        messageInput.focus();
        messageInput.dispatchEvent(new Event('input'));
    }
    
    // Username modal
    function showUsernameModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.id = 'usernameModal';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h2>✨ Join the chat</h2>
                <p>Pick a display name to start messaging</p>
                <input type="text" id="usernameInput" placeholder="e.g., Alice, Bob, Designer" maxlength="24" autocomplete="off">
                <button id="confirmUsernameBtn" class="modal-btn">Continue →</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const inputField = document.getElementById('usernameInput');
        const confirmBtn = document.getElementById('confirmUsernameBtn');
        
        const finishSetup = () => {
            let newName = inputField.value.trim();
            if (newName === "") {
                newName = "Guest" + Math.floor(Math.random() * 1000);
            }
            if (newName.length > 24) newName = newName.slice(0,24);
            currentUser.name = newName;
            currentUser.id = generateId();
            currentUsernameSpan.innerText = currentUser.name;
            modalDiv.remove();
            // add welcome system message? but add info message as "joined"
            addMessage("🟢 System", `${currentUser.name} joined the conversation`, false, generateId());
            // also maybe start a welcome bot response after 1 second
            setTimeout(() => {
                const welcomeBot = botNames[Math.floor(Math.random() * botNames.length)];
                addMessage(welcomeBot, `Welcome ${currentUser.name}! Feel free to chat. I'm an AI buddy 🤖`, false);
            }, 500);
        };
        
        confirmBtn.onclick = finishSetup;
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') finishSetup();
        });
        inputField.focus();
    }
    
    // Check if username is set initially
    function init() {
        showUsernameModal();
        // event listeners
        sendBtn.addEventListener('click', sendMessage);
        emojiBtn.addEventListener('click', insertEmoji);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    }
    
    // start application
    init();
</script>
</body>
</html>
